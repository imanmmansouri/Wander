function buildPrompt(source) {
  const destination = source.type === "bundle"
    ? `${SEASON_BUNDLES[source.season].country} (${source.season} season)`
    : source.destination;
  const context = source.type === "bundle"
    ? `Curated ${source.season} season bundle for ${SEASON_BUNDLES[source.season].country}.`
    : `Destination: ${source.destination}\nDates: ${source.startDate} to ${source.endDate}\nTravelers: ${source.travelers}\nBudget: $${source.budget} USD`;
  return `You are WanderU, an expert AI travel planner. Generate a detailed 3-day travel itinerary for ${destination}.\n\n${context}\n\nReturn ONLY a valid JSON object — no markdown, no backticks, no commentary. Schema:\n{\n  "tripTitle": "string",\n  "destination": "string",\n  "country": "string",\n  "flag": "emoji",\n  "tagline": "string",\n  "highlights": ["string","string","string"],\n  "days": [\n    {\n      "dayNumber": 1,\n      "theme": "short evocative theme",\n      "restaurants":   [{"name":"","cuisine":"","rating":"4.7","priceRange":"$$","bestTime":"Dinner","reservationRequired":true,"mustTry":"","locationHint":"","mapsQuery":""}],\n      "sites":         [{"name":"","type":"Museum","openingHours":"09:00-18:00","entryFee":"$12","highlight":"","tip":"","mapsQuery":""}],\n      "nature":        [{"name":"","type":"Park","bestTime":"Morning","highlight":"","tip":"","mapsQuery":""}],\n      "entertainment": [{"name":"","type":"Live Show","bestTime":"Evening","price":"$25 per person","highlight":"","mapsQuery":""}],\n      "shopping":      [{"name":"","type":"Market","specialty":"","openingHours":"10:00-22:00","tip":"","mapsQuery":""}],\n      "trending":      [{"name":"","why":"","vibe":"Instagrammable","tip":"","mapsQuery":""}]\n    }\n  ],\n  "practicalInfo": {"currency":"","language":"","transport":"","bestMonths":"","budgetTip":""}\n}\nRules: exactly 3 days, 1 entry per category per day, all strings under 120 chars.`;
}

function repairJSON(raw) {
  let s = raw.replace(/```json|```/g, "").trim();
  try { return JSON.parse(s); } catch (_) {}
  let braces = 0, brackets = 0, inString = false, escape = false;
  for (const c of s) {
    if (escape) { escape = false; continue; }
    if (c === "\\" && inString) { escape = true; continue; }
    if (c === '"') { inString = !inString; continue; }
    if (inString) continue;
    if (c === "{") braces++; else if (c === "}") braces--;
    else if (c === "[") brackets++; else if (c === "]") brackets--;
  }
  if (inString) s += '"';
  s = s.replace(/,\s*"[^"]*"\s*:\s*[^,}\]]*$/, "").replace(/,\s*"[^"]*"\s*$/, "").replace(/,\s*$/, "");
  while (brackets > 0) { s += "]"; brackets--; }
  while (braces > 0) { s += "}"; braces--; }
  try { return JSON.parse(s); } catch (e) { throw new Error("Could not parse AI response. Please try again."); }
}

async function generateItinerary(source) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 8000, messages: [{ role: "user", content: buildPrompt(source) }] }),
  });
  if (!response.ok) { const err = await response.json().catch(() => ({})); throw new Error(err?.error?.message || `API error ${response.status}`); }
  const data = await response.json();
  return repairJSON(data.content.map(b => b.text || "").join(""));
}

function TripPlanPage({ source, setActivePage }) {
  const [plan,setPlan] = useState(null);
  const [loading,setLoading] = useState(true);
  const [error,setError] = useState(null);
  const [openDays,setOpenDays] = useState(new Set([1]));
  const [activeDay,setActiveDay] = useState(null);
  const destination = source?.type==="bundle" ? SEASON_BUNDLES[source.season]?.country : source?.destination||"your destination";
  const load = async () => {
    setLoading(true); setError(null); setPlan(null);
    try { const r=await generateItinerary(source); setPlan(r); setOpenDays(new Set([1])); }
    catch(e) { setError(e.message||"Unknown error"); }
    finally { setLoading(false); }
  };
  useEffect(()=>{load();},[]);
  const toggleDay = n => setOpenDays(prev=>{ const next=new Set(prev); next.has(n)?next.delete(n):next.add(n); return next; });
  const handleDayFilter = n => { setActiveDay(n); setOpenDays(new Set(n?[n]:[1])); };
  const isBundle = source?.type==="bundle";
  const seasonM  = isBundle ? SEASON_META[source.season] : null;
  const heroGrad = seasonM  ? seasonM.gradient : "from-teal-500 via-cyan-500 to-blue-600";
  if (loading) return <LoadingScreen destination={destination}/>;
  if (error) return (
    <div className="min-h-[50vh] flex flex-col items-center justify-center px-6 text-center py-16">
      <div className="text-6xl mb-4">😕</div>
      <h2 className="text-xl font-bold text-slate-800 mb-2" style={{fontFamily:"'Syne',sans-serif"}}>Couldn't generate your plan</h2>
      <p className="text-slate-500 text-sm mb-6 max-w-xs">{error}</p>
      <div className="flex gap-3 flex-wrap justify-center">
        <button onClick={load} className="bg-gradient-to-r from-teal-500 to-blue-500 text-white font-bold px-6 py-3 rounded-2xl shadow hover:opacity-90 transition">🔄 Try Again</button>
        <button onClick={()=>setActivePage("Home")} className="bg-slate-100 text-slate-700 font-semibold px-6 py-3 rounded-2xl hover:bg-slate-200 transition">← Back to Home</button>
      </div>
    </div>
  );
  if (!plan) return null;
  const visibleDays = activeDay ? plan.days.filter(d=>d.dayNumber===activeDay) : plan.days;
  return (
    <div>
      <div className={`relative bg-gradient-to-br ${heroGrad} text-white overflow-hidden`}>
        <div className="absolute inset-0 opacity-10" style={{backgroundImage:"radial-gradient(circle, white 1px, transparent 1px)",backgroundSize:"24px 24px"}}/>
        <div className="relative z-10 max-w-4xl mx-auto px-4 sm:px-6 py-10 sm:py-14">
          <div className="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-6">

              {isBundle&&<span className="inline-block text-xs font-bold bg-white/20 backdrop-blur px-3 py-1 rounded-full mb-3 uppercase tracking-widest border border-white/20">{seasonM.icon} {source.season} Bundle</span>}

              <p className="text-white/80 text-base mb-1">{plan.destination} {plan.flag}</p>
              <p className="text-white/60 text-sm italic mb-5">{plan.tagline}</p>
              <div className="flex flex-wrap gap-2">

            <div className="flex sm:flex-col gap-3 flex-shrink-0">
              <div className="bg-white/15 backdrop-blur border border-white/20 rounded-2xl px-4 py-3 text-center">
                <p className="text-2xl font-extrabold" style={{fontFamily:"'Syne',sans-serif"}}>{plan.days?.length||3}</p>
                <p className="text-white/70 text-xs uppercase tracking-wide">Days</p>
              </div>
              {source?.budget&&(
                <div className="bg-white/15 backdrop-blur border border-white/20 rounded-2xl px-4 py-3 text-center">
                  <p className="text-2xl font-extrabold" style={{fontFamily:"'Syne',sans-serif"}}>${source.budget}</p>
                  <p className="text-white/70 text-xs uppercase tracking-wide">Budget</p>
                </div>
              )}
            </div>
          </div>
          <div className="flex flex-wrap gap-3 mt-6">
            <button onClick={load} className="inline-flex items-center gap-2 bg-white/20 hover:bg-white/30 backdrop-blur border border-white/20 text-white text-sm font-semibold px-5 py-2.5 rounded-xl transition-all">🔄 Regenerate</button>
            <button className="inline-flex items-center gap-2 bg-white text-teal-700 hover:bg-white/90 text-sm font-bold px-5 py-2.5 rounded-xl shadow transition-all">❤️ Save to Wishlist</button>
            <button onClick={()=>setActivePage("Home")} className="inline-flex items-center gap-2 bg-white/20 hover:bg-white/30 backdrop-blur border border-white/20 text-white text-sm font-semibold px-5 py-2.5 rounded-xl transition-all">← New Plan</button>
          </div>
        </div>
      </div>
      <div className="bg-white/90 backdrop-blur-sm border-b border-slate-100 shadow-sm">
        <div className="flex gap-2 overflow-x-auto px-4 py-3 max-w-4xl mx-auto" style={{scrollbarWidth:"none"}}>
          <button onClick={()=>handleDayFilter(null)} className={`flex-shrink-0 text-xs font-bold px-4 py-2 rounded-xl transition-all ${activeDay===null?"bg-slate-800 text-white shadow":"bg-slate-100 text-slate-500 hover:bg-slate-200"}`}>All Days</button>
          {plan.days.map(d=>(
            <button key={d.dayNumber} onClick={()=>handleDayFilter(d.dayNumber)}
              className={`flex-shrink-0 text-xs font-bold px-4 py-2 rounded-xl transition-all ${activeDay===d.dayNumber?"bg-gradient-to-r from-teal-500 to-blue-500 text-white shadow":"bg-slate-100 text-slate-500 hover:bg-slate-200"}`}>
              Day {d.dayNumber}
            </button>
          ))}
        </div>
      </div>
      <div className="max-w-4xl mx-auto px-4 py-6 space-y-5">
        {visibleDays.map((day,i)=>(
          <DayAccordion key={day.dayNumber} day={day} index={i} isOpen={openDays.has(day.dayNumber)} onToggle={()=>toggleDay(day.dayNumber)}/>
        ))}
        <PracticalInfo info={plan.practicalInfo}/>
        <div className="bg-gradient-to-br from-slate-800 to-slate-900 rounded-3xl p-6 text-center text-white">
          <p className="text-white/60 text-sm mb-1">Not quite right?</p>
          <h3 className="font-bold text-lg mb-4" style={{fontFamily:"'Syne',sans-serif"}}>Try a different plan</h3>
          <div className="flex flex-wrap gap-3 justify-center">
            <button onClick={load} className="bg-teal-500 hover:bg-teal-400 text-white font-bold px-6 py-3 rounded-2xl shadow transition">🔄 Regenerate Plan</button>
            <button onClick={()=>setActivePage("Home")} className="bg-white/10 hover:bg-white/20 border border-white/20 text-white font-semibold px-6 py-3 rounded-2xl transition">← Change Destination</button>
          </div>
        </div>
      </div>
    </div>
  );
}

    <>

        body { font-family: 'DM Sans', sans-serif; background: #f8fafc; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      `}</style>
      <div className="min-h-screen bg-slate-50">
        <Navbar activePage={activePage} setActivePage={setActivePage}/>
        {activePage==="Home"      && <HomePage      onGenerate={handleGenerate}/>}
        {activePage==="Trip Plan" && <TripPlanPage  source={tripSource} setActivePage={setActivePage}/>}
        {activePage==="Dashboard" && <DashboardPage/>}
        {activePage==="Profile"   && <ProfilePage/>}
        <footer className="border-t border-slate-100 py-8 px-4 text-center text-xs text-slate-400 mt-10">

          <p>AI-powered travel planning · MVP · Built with Claude</p>
        </footer>
      </div>
    </>
  );
}
